name: Update oil prices

# Runs daily at 13:30 UTC on weekdays (= 9:30 AM ET, just after the US oil
# market opens). Also runnable manually via the Actions tab.
on:
  schedule:
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch latest prices
        run: node scripts/fetch-prices.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          if git diff --cached --quiet; then
            echo "No price changes — skipping commit"
          else
            git commit -m "chore: update oil prices ($(date -u +%Y-%m-%d))"
            git push
          fi
